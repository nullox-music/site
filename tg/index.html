<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Telegram — Nullox</title>
  <!-- instant redirect -->
  <meta http-equiv="refresh" content="2;url=https://t.me/nullox_music"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../style.css"/>
  <style>
    .redirect-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .redirect-icon {
      width: 56px;
      height: 56px;
      margin-bottom: 28px;
      opacity: 0.7;
    }

    .redirect-page h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 300;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .redirect-page p {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .redirect-page a.manual {
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2px;
      transition: color 0.2s;
    }
    .redirect-page a.manual:hover { color: var(--text); }

    /* progress bar */
    .progress-bar {
      width: 160px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 28px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--grad);
      border-radius: 2px;
      animation: fillBar 2s linear forwards;
    }

    @keyframes fillBar {
      from { width: 0%; }
      to   { width: 100%; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/site">NULLOX</a>
  <div class="nav-links">
    <a href="/site/about_us">About</a>
  </div>
</nav>

<section class="redirect-page">
  <svg class="redirect-icon" viewBox="0 0 56 56" fill="none" stroke="url(#tgGrad)" stroke-width="1.5">
    <defs>
      <linearGradient id="tgGrad" x1="0" y1="0" x2="56" y2="0" gradientUnits="userSpaceOnUse">
        <stop offset="0%"   stop-color="#FF6B00"/>
        <stop offset="100%" stop-color="#BF00FF"/>
      </linearGradient>
    </defs>
    <path d="M50 10L6 26l16 6 6 16 7-12 12 8 3-34z"/>
  </svg>

  <h1>Taking you to <span class="grad-text">Telegram</span></h1>
  <p>Redirecting in 2 seconds…</p>

  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>

  <a class="btn btn-grad" href="https://t.me/nullox_music" style="margin-bottom:20px;">Open Telegram now</a>
  <br/>
  <a class="manual" href="/">← Back to Nullvox</a>
</section>

<script>
  setTimeout(() => {
    window.location.href = 'https://t.me/nullox_music';
  }, 2000);
</script>
</body>
</html>
>
